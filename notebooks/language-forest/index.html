<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Language Forest</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #050d08;
  color: #c8e6c9;
  font-family: 'Segoe UI', system-ui, sans-serif;
  overflow-x: hidden;
  min-height: 100vh;
}
#game-canvas {
  position: fixed;
  top: 0; left: 0;
  width: 100vw; height: 100vh;
  z-index: 0;
}
#ui-layer {
  position: relative;
  z-index: 1;
  pointer-events: none;
}
#ui-layer > * { pointer-events: auto; }
.hud {
  position: fixed;
  top: 0; left: 0; right: 0;
  padding: 12px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: linear-gradient(180deg, rgba(5,13,8,0.9) 0%, transparent 100%);
  z-index: 10;
}
.hud-title {
  font-size: 16px;
  font-weight: 700;
  color: #66bb6a;
}
.hud-chapter {
  font-size: 13px;
  color: #ffd54f;
}
.hud-progress {
  display: flex; gap: 6px;
}
.hud-dot {
  width: 12px; height: 12px;
  border-radius: 50%;
  border: 2px solid #1b5e20;
  transition: all 0.5s;
}
.hud-dot.done { background: #66bb6a; border-color: #66bb6a; }
.hud-dot.active { border-color: #ffd54f; box-shadow: 0 0 8px #ffd54f; }

/* Panels that float over the canvas */
.panel {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(10, 26, 15, 0.92);
  border: 1px solid #1b5e20;
  border-radius: 16px;
  padding: 20px 28px;
  max-width: 700px;
  width: calc(100% - 40px);
  backdrop-filter: blur(12px);
  box-shadow: 0 8px 40px rgba(0,0,0,0.6);
  z-index: 5;
  animation: panelIn 0.5s ease-out;
}
@keyframes panelIn {
  from { opacity: 0; transform: translateX(-50%) translateY(30px); }
  to { opacity: 1; transform: translateX(-50%) translateY(0); }
}
.panel-center {
  bottom: auto;
  top: 50%;
  transform: translate(-50%, -50%);
}
@keyframes panelCenterIn {
  from { opacity: 0; transform: translate(-50%, -50%) scale(0.9); }
  to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
}
.panel-center { animation: panelCenterIn 0.6s ease-out; }

.panel h2 {
  color: #e8f5e9;
  font-size: 22px;
  margin-bottom: 8px;
}
.panel p {
  color: #a5c4a8;
  font-size: 14px;
  line-height: 1.6;
  margin-bottom: 12px;
}
.panel .highlight { color: #ffd54f; font-weight: 600; }
.panel .green { color: #66bb6a; font-weight: 600; }

.btn {
  padding: 12px 28px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  font-size: 15px;
  font-weight: 700;
  transition: all 0.2s;
  display: inline-flex;
  align-items: center;
  gap: 8px;
}
.btn:hover { transform: translateY(-2px); }
.btn:active { transform: translateY(0); }
.btn-gold {
  background: linear-gradient(135deg, #ffd54f, #ff9800);
  color: #1a1a00;
  box-shadow: 0 4px 20px rgba(255,213,79,0.3);
}
.btn-green {
  background: linear-gradient(135deg, #66bb6a, #388e3c);
  color: #fff;
  box-shadow: 0 4px 20px rgba(102,187,106,0.3);
}
.btn-dim {
  background: rgba(102,187,106,0.15);
  color: #66bb6a;
  border: 1px solid #1b5e20;
}

/* Codebook grid */
.cb-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  justify-content: center;
  margin: 10px 0;
}
.cb-cell {
  width: 42px; height: 50px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: rgba(102,187,106,0.08);
  border: 2px solid #1b5e20;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.15s;
  user-select: none;
}
.cb-cell:hover { border-color: #66bb6a; background: rgba(102,187,106,0.15); }
.cb-cell .letter { font-size: 18px; font-weight: 700; color: #e8f5e9; }
.cb-cell .num { font-size: 11px; color: #ffd54f; margin-top: 1px; }
.cb-cell.assigned {
  border-color: #66bb6a;
  background: rgba(102,187,106,0.2);
}
.cb-cell.glow {
  border-color: #ffd54f;
  box-shadow: 0 0 16px rgba(255,213,79,0.4);
  transform: scale(1.1);
}

/* Encode sequence */
.seq-display {
  display: flex;
  gap: 3px;
  justify-content: center;
  flex-wrap: wrap;
  margin: 12px 0;
}
.seq-slot {
  width: 48px; height: 56px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  border-radius: 8px;
  border: 2px solid transparent;
  font-weight: 700;
  transition: all 0.2s;
}
.seq-slot .s-char { font-size: 16px; }
.seq-slot .s-num { font-size: 13px; margin-top: 2px; }
.seq-slot.done { border-color: #66bb6a; background: rgba(102,187,106,0.12); }
.seq-slot.done .s-char { color: #a5c4a8; }
.seq-slot.done .s-num { color: #66bb6a; }
.seq-slot.active { border-color: #ffd54f; background: rgba(255,213,79,0.1); box-shadow: 0 0 12px rgba(255,213,79,0.2); }
.seq-slot.active .s-char { color: #ffd54f; }
.seq-slot.waiting .s-char { color: #3a5a3e; }

/* Number pad */
.numpad {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  justify-content: center;
  margin: 8px 0;
}
.numpad-btn {
  width: 36px; height: 34px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(79,195,247,0.08);
  border: 1px solid #1b5e20;
  border-radius: 6px;
  color: #c8e6c9;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
}
.numpad-btn:hover { background: rgba(79,195,247,0.2); border-color: #4fc3f7; }
.numpad-btn.wrong { animation: shake 0.3s; background: rgba(239,83,80,0.2); border-color: #ef5350; }
@keyframes shake { 25%{transform:translateX(-3px)} 75%{transform:translateX(3px)} }

.msg {
  text-align: center;
  padding: 10px;
  border-radius: 8px;
  margin: 8px 0;
  font-weight: 600;
  animation: panelIn 0.3s;
}
.msg-ok { background: rgba(102,187,106,0.15); color: #66bb6a; }
.msg-err { background: rgba(239,83,80,0.1); color: #ef5350; }

/* Slider */
.range-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin: 6px 0;
}
.range-row label { min-width: 90px; font-size: 13px; color: #a5c4a8; }
.range-row input[type=range] { flex: 1; accent-color: #66bb6a; }
.range-row .rv { min-width: 40px; text-align: right; color: #ffd54f; font-weight: 700; font-size: 14px; }

/* Aha box */
.aha {
  background: linear-gradient(135deg, rgba(255,213,79,0.08), rgba(255,152,0,0.05));
  border-left: 3px solid #ffd54f;
  padding: 14px 16px;
  border-radius: 0 10px 10px 0;
  margin: 12px 0;
  font-size: 13px;
  line-height: 1.7;
}
.aha strong { color: #ffd54f; }
.aha .real { color: #4fc3f7; }
</style>
</head>
<body>

<canvas id="game-canvas"></canvas>

<div id="ui-layer">
  <div class="hud" id="hud" style="display:none;">
    <div class="hud-title">🌲 The Language Forest</div>
    <div class="hud-chapter" id="hud-chapter"></div>
    <div class="hud-progress" id="hud-dots"></div>
  </div>
  <div id="panels"></div>
</div>

<script>
/* ═══════════════════════════════════════════════════════════════
   GAME ENGINE
   ═══════════════════════════════════════════════════════════════ */
const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// ─── Utilities ───
const lerp = (a, b, t) => a + (b - a) * t;
const rand = (lo, hi) => lo + Math.random() * (hi - lo);
const randInt = (lo, hi) => Math.floor(rand(lo, hi));
const ease = t => t < 0.5 ? 2*t*t : -1+(4-2*t)*t;
const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));

// ─── Particle System ───
class Particle {
  constructor(x, y, opts = {}) {
    this.x = x; this.y = y;
    this.vx = opts.vx || 0;
    this.vy = opts.vy || 0;
    this.life = opts.life || 2;
    this.maxLife = this.life;
    this.size = opts.size || 3;
    this.color = opts.color || '#66bb6a';
    this.gravity = opts.gravity || 0;
    this.friction = opts.friction || 1;
    this.glow = opts.glow || 0;
    this.dead = false;
  }
  update(dt) {
    this.vy += this.gravity * dt;
    this.vx *= this.friction;
    this.vy *= this.friction;
    this.x += this.vx * dt;
    this.y += this.vy * dt;
    this.life -= dt;
    if (this.life <= 0) this.dead = true;
  }
  draw(ctx) {
    const alpha = clamp(this.life / this.maxLife, 0, 1);
    const s = this.size * (0.5 + 0.5 * alpha);
    if (this.glow > 0) {
      ctx.shadowBlur = this.glow;
      ctx.shadowColor = this.color;
    }
    ctx.globalAlpha = alpha;
    ctx.fillStyle = this.color;
    ctx.beginPath();
    ctx.arc(this.x, this.y, s, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
    ctx.shadowBlur = 0;
  }
}

let particles = [];
function spawnParticles(x, y, count, opts = {}) {
  for (let i = 0; i < count; i++) {
    particles.push(new Particle(x, y, {
      vx: rand(-60, 60) * (opts.spread || 1),
      vy: rand(-80, 10) * (opts.spread || 1),
      life: rand(0.5, 1.5) * (opts.lifeMul || 1),
      size: rand(1.5, 4) * (opts.sizeMul || 1),
      color: opts.color || '#66bb6a',
      gravity: opts.gravity ?? 40,
      glow: opts.glow || 8,
      ...opts,
    }));
  }
}

// ─── Fireflies (ambient) ───
class Firefly {
  constructor() { this.reset(); }
  reset() {
    this.x = rand(0, W);
    this.y = rand(0, H);
    this.phase = rand(0, Math.PI * 2);
    this.speed = rand(0.3, 1.2);
    this.size = rand(1, 3);
    this.hue = rand(80, 140);
    this.drift = rand(-15, 15);
  }
  update(dt, t) {
    this.x += this.drift * dt;
    this.y += Math.sin(this.phase + t * this.speed) * 12 * dt;
    if (this.x < -20 || this.x > W + 20 || this.y < -20 || this.y > H + 20) this.reset();
  }
  draw(ctx, t) {
    const brightness = 0.3 + 0.7 * Math.sin(this.phase + t * this.speed * 2) ** 2;
    ctx.globalAlpha = brightness * 0.6;
    ctx.shadowBlur = 12;
    ctx.shadowColor = `hsl(${this.hue}, 70%, 60%)`;
    ctx.fillStyle = `hsl(${this.hue}, 70%, 70%)`;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
  }
}
const fireflies = Array.from({length: 40}, () => new Firefly());

// ─── Ants ───
class Ant {
  constructor(x, y, targetX, targetY, payload, color) {
    this.x = x; this.y = y;
    this.targetX = targetX; this.targetY = targetY;
    this.payload = payload;
    this.color = color || '#ffd54f';
    this.progress = 0;
    this.speed = rand(0.3, 0.6);
    this.wobble = rand(0, Math.PI * 2);
    this.done = false;
    this.startX = x; this.startY = y;
  }
  update(dt, t) {
    if (this.done) return;
    this.progress = Math.min(1, this.progress + this.speed * dt);
    const p = ease(this.progress);
    this.x = lerp(this.startX, this.targetX, p);
    this.y = lerp(this.startY, this.targetY, p) + Math.sin(t * 8 + this.wobble) * 3;
    if (this.progress >= 1) this.done = true;
    // Leave trail particles
    if (Math.random() < 0.3) {
      particles.push(new Particle(this.x, this.y + 4, {
        size: 1.2, life: 0.8, color: this.color + '88', glow: 4, gravity: 0, vx: 0, vy: 0
      }));
    }
  }
  draw(ctx, t) {
    // Body
    ctx.fillStyle = '#3e2723';
    ctx.beginPath();
    ctx.ellipse(this.x, this.y, 5, 3.5, 0, 0, Math.PI * 2);
    ctx.fill();
    // Head
    ctx.beginPath();
    ctx.arc(this.x + 4, this.y - 1, 2.5, 0, Math.PI * 2);
    ctx.fill();
    // Legs
    ctx.strokeStyle = '#3e2723';
    ctx.lineWidth = 0.8;
    for (let i = -1; i <= 1; i++) {
      const legPhase = Math.sin(t * 12 + i * 2 + this.wobble);
      ctx.beginPath();
      ctx.moveTo(this.x + i * 3, this.y + 2);
      ctx.lineTo(this.x + i * 3 + legPhase * 2, this.y + 6);
      ctx.stroke();
    }
    // Payload glow
    if (this.payload !== null) {
      ctx.shadowBlur = 10;
      ctx.shadowColor = this.color;
      ctx.fillStyle = this.color;
      ctx.beginPath();
      ctx.arc(this.x, this.y - 5, 3.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.fillStyle = '#000';
      ctx.font = 'bold 5px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(this.payload, this.x, this.y - 3.5);
    }
  }
}
let ants = [];

// ─── Trees (background) ───
class Tree {
  constructor(x, y, size) {
    this.x = x; this.y = y; this.size = size;
    this.sway = rand(0, Math.PI * 2);
    this.swayAmt = rand(2, 6);
    this.shade = randInt(15, 35);
  }
  draw(ctx, t) {
    const sx = Math.sin(t * 0.5 + this.sway) * this.swayAmt;
    const s = this.size;
    // Trunk
    ctx.fillStyle = `hsl(30, 30%, ${this.shade - 5}%)`;
    ctx.fillRect(this.x - s * 0.08, this.y - s * 0.5, s * 0.16, s * 0.5);
    // Canopy layers
    for (let i = 0; i < 3; i++) {
      const ly = this.y - s * 0.4 - i * s * 0.25;
      const lw = s * (0.5 - i * 0.12);
      ctx.fillStyle = `hsl(${130 + i * 10}, ${40 + i * 5}%, ${this.shade + i * 3}%)`;
      ctx.beginPath();
      ctx.moveTo(this.x - lw + sx * (1 + i * 0.3), ly);
      ctx.lineTo(this.x + sx * (1.5 + i * 0.3), ly - s * 0.3);
      ctx.lineTo(this.x + lw + sx * (1 + i * 0.3), ly);
      ctx.fill();
    }
  }
}
const trees = [];
function generateTrees() {
  trees.length = 0;
  for (let i = 0; i < 25; i++) {
    trees.push(new Tree(rand(-50, W + 50), rand(H * 0.3, H * 0.85), rand(40, 120)));
  }
  trees.sort((a, b) => a.y - b.y); // depth sort
}
generateTrees();
window.addEventListener('resize', generateTrees);

// ─── Water Drops (for Ch2) ───
class WaterDrop {
  constructor(x, y, vx, vy) {
    this.x = x; this.y = y; this.vx = vx; this.vy = vy;
    this.life = rand(2, 5);
    this.maxLife = this.life;
    this.size = rand(2, 4);
  }
  update(dt) {
    this.vy += 50 * dt; // gravity
    this.x += this.vx * dt;
    this.y += this.vy * dt;
    this.life -= dt;
    if (this.life <= 0 || this.y > H) this.dead = true;
  }
  draw(ctx) {
    const a = clamp(this.life / this.maxLife, 0, 1);
    ctx.globalAlpha = a * 0.7;
    ctx.fillStyle = '#4fc3f7';
    ctx.shadowBlur = 6;
    ctx.shadowColor = '#4fc3f7';
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
  }
}
let waterDrops = [];

// ─── Render Loop ───
let time = 0;
let scene = 'title'; // title, ch1, ch2, ch3, ch4, ch5, victory
let sceneData = {};

function drawBackground(t) {
  // Sky gradient
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#030a06');
  grad.addColorStop(0.4, '#081a0e');
  grad.addColorStop(1, '#0a1f12');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Ground
  ctx.fillStyle = '#0a1a0f';
  ctx.fillRect(0, H * 0.85, W, H * 0.15);
  // Ground line glow
  ctx.strokeStyle = '#1b5e2044';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(0, H * 0.85);
  ctx.lineTo(W, H * 0.85);
  ctx.stroke();
}

function frame(timestamp) {
  const dt = Math.min(0.05, (timestamp - (frame.last || timestamp)) / 1000);
  frame.last = timestamp;
  time += dt;

  ctx.clearRect(0, 0, W, H);
  drawBackground(time);

  // Trees
  trees.forEach(t => t.draw(ctx, time));

  // Scene-specific rendering
  if (sceneDraw[scene]) sceneDraw[scene](dt, time);

  // Ants
  ants = ants.filter(a => { a.update(dt, time); a.draw(ctx, time); return !a.done || time - a.doneTime < 0.5; });
  ants.forEach(a => { if (a.done && !a.doneTime) { a.doneTime = time; spawnParticles(a.x, a.y, 8, { color: a.color, spread: 0.5 }); }});

  // Water
  waterDrops = waterDrops.filter(d => { d.update(dt); if (!d.dead) d.draw(ctx); return !d.dead; });

  // Particles
  particles = particles.filter(p => { p.update(dt); if (!p.dead) p.draw(ctx); return !p.dead; });

  // Fireflies
  fireflies.forEach(f => { f.update(dt, time); f.draw(ctx, time); });

  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

// Scene-specific draw functions
const sceneDraw = {};

/* ═══════════════════════════════════════════════════════════════
   GAME STATE
   ═══════════════════════════════════════════════════════════════ */
const ALPHA = 'abcdefghijklmnopqrstuvwxyz';
const NAMES = ['emma','olivia','liam','noah','ava','sophia','jackson','lucas','mia','harper','aria','ella','riley','zoey','chloe'];
let completed = [false,false,false,false,false];

function setPanel(html) {
  document.getElementById('panels').innerHTML = html;
}

function updateHud(chapterName) {
  const hud = document.getElementById('hud');
  hud.style.display = 'flex';
  document.getElementById('hud-chapter').textContent = chapterName;
  const icons = ['🐜','🏔️','🌳','🏘️','🔮'];
  document.getElementById('hud-dots').innerHTML = icons.map((ic, i) =>
    `<div class="hud-dot ${completed[i] ? 'done' : ''} ${scene === 'ch'+(i+1) ? 'active' : ''}" title="Ch${i+1}">${ic}</div>`
  ).join('');
}

/* ═══════════════════════════════════════════════════════════════
   TITLE SCREEN
   ═══════════════════════════════════════════════════════════════ */
function showTitle() {
  scene = 'title';
  document.getElementById('hud').style.display = 'none';
  setPanel(`
    <div class="panel panel-center" style="text-align:center; max-width:560px;">
      <h2 style="font-size:36px; margin-bottom:4px;">🌲 The Language Forest</h2>
      <p style="font-size:16px; color:#6b8f6e; margin-bottom:24px;">Build a language model from scratch — no code, just intuition</p>
      <div style="display:grid; gap:8px; text-align:left; margin-bottom:24px;">
        ${['🐜 The Ant Trail — turn messages into codes',
           '🏔️ The River Network — trace cause and effect',
           '🌳 The Whispering Trees — learn to pay attention',
           '🏘️ The Village Elder — learn from mistakes',
           '🔮 The Oracle Speaks — create something new'
        ].map(t => `<div style="padding:8px 12px; background:rgba(102,187,106,0.06); border-radius:8px; font-size:14px;">${t}</div>`).join('')}
      </div>
      <button class="btn btn-gold" onclick="startCh1()" style="font-size:17px; padding:14px 40px;">🌱 Enter the Forest</button>
    </div>
  `);
}
showTitle();

/* ═══════════════════════════════════════════════════════════════
   CHAPTER 1: THE ANT TRAIL (TOKENIZER)
   ═══════════════════════════════════════════════════════════════ */
let ch1 = { codebook: {}, nextId: 0, stage: 0, word: '', target: [], pos: 0, decodeWord: '' };

function startCh1() {
  scene = 'ch1';
  ch1 = { codebook: {}, nextId: 0, stage: 1, word: '', target: [], pos: 0, decodeWord: '' };
  updateHud('🐜 Chapter 1: The Ant Trail');
  ch1ShowStage1();
}

function ch1ShowStage1() {
  ch1.stage = 1;
  setPanel(`
    <div class="panel">
      <h2>🐜 Build the Scent Codebook</h2>
      <p>Ants communicate with <span class="highlight">scent codes</span>. Each letter needs a unique number. <strong>Click letters</strong> to assign them — watch the ants carry each one to the codebook stone!</p>
      <div class="cb-grid" id="cb-grid">
        ${ALPHA.split('').map(c => `<div class="cb-cell" id="cb-${c}" onclick="ch1Assign('${c}')"><span class="letter">${c}</span><span class="num" id="cbn-${c}"></span></div>`).join('')}
      </div>
      <p style="text-align:center; font-size:13px; color:#6b8f6e;" id="cb-status">Click any letter to begin — ${26 - ch1.nextId} remaining</p>
      <div id="cb-next" style="text-align:center; display:none;">
        <button class="btn btn-green" onclick="ch1ShowStage2()">Continue → Encode a Message</button>
      </div>
    </div>
  `);
}

function ch1Assign(c) {
  if (ch1.codebook[c] !== undefined) return;
  ch1.codebook[c] = ch1.nextId;
  const cell = document.getElementById(`cb-${c}`);
  cell.classList.add('assigned');
  document.getElementById(`cbn-${c}`).textContent = ch1.nextId;

  // Spawn ant carrying this assignment
  const rect = cell.getBoundingClientRect();
  const ax = rect.left + rect.width/2;
  const ay = rect.top + rect.height/2;
  // Destination: top of screen (codebook stone)
  ants.push(new Ant(ax, ay, W/2 + rand(-100, 100), H * 0.2, ch1.nextId, `hsl(${ch1.nextId * 14}, 70%, 60%)`));
  spawnParticles(ax, ay, 6, { color: '#66bb6a', spread: 0.4, glow: 10 });

  ch1.nextId++;
  document.getElementById('cb-status').textContent = ch1.nextId === 26
    ? '✅ All letters assigned!'
    : `${26 - ch1.nextId} letters remaining`;

  if (ch1.nextId === 26) {
    document.getElementById('cb-next').style.display = 'block';
    spawnParticles(W/2, H/2, 30, { color: '#ffd54f', spread: 2, glow: 15, sizeMul: 1.5 });
  }
}

function ch1RenderCodebookRef() {
  const entries = Object.entries(ch1.codebook).sort((a,b) => a[1] - b[1]);
  return `<div class="cb-grid" style="gap:3px;">
    ${entries.map(([c, id]) => {
      const isActive = ch1.stage === 2 && ch1.pos < ch1.target.length &&
        ((ch1.target[ch1.pos] === 26 && false) || ch1.codebook[c] === ch1.target[ch1.pos]);
      return `<div class="cb-cell ${isActive ? 'glow' : 'assigned'}" style="width:34px;height:40px;cursor:default">
        <span class="letter" style="font-size:14px">${c}</span>
        <span class="num" style="font-size:10px">${id}</span>
      </div>`;
    }).join('')}
    <div class="cb-cell ${ch1.stage === 2 && ch1.pos < ch1.target.length && ch1.target[ch1.pos] === 26 ? 'glow' : 'assigned'}" style="width:46px;height:40px;cursor:default;border-color:#ffd54f">
      <span class="letter" style="font-size:11px;color:#ffd54f">BOS</span>
      <span class="num" style="font-size:10px">26</span>
    </div>
  </div>`;
}

function ch1ShowStage2() {
  ch1.stage = 2;
  ch1.word = NAMES[randInt(0, NAMES.length)];
  ch1.target = [26, ...ch1.word.split('').map(c => ch1.codebook[c]), 26];
  ch1.pos = 0;
  ch1RenderStage2();
}

function ch1RenderStage2() {
  const labels = ['⟨BOS⟩', ...ch1.word.split(''), '⟨BOS⟩'];
  const seqHtml = labels.map((label, i) => {
    const cls = i < ch1.pos ? 'done' : i === ch1.pos ? 'active' : 'waiting';
    const num = i < ch1.pos ? ch1.target[i] : (i === ch1.pos ? '?' : '');
    return `<div class="seq-slot ${cls}"><span class="s-char">${label}</span><span class="s-num">${num}</span></div>`;
  }).join('');

  const numpadHtml = Array.from({length:27}, (_, i) =>
    `<div class="numpad-btn" id="np-${i}" onclick="ch1Pick(${i})">${i}</div>`
  ).join('');

  setPanel(`
    <div class="panel">
      <h2>🐜 Encode: <span class="highlight">${ch1.word}</span></h2>
      <p>Click the correct scent number for each position. Messages always start and end with <span class="highlight">⟨BOS⟩ = 26</span>.</p>
      <details open style="margin:8px 0;">
        <summary style="cursor:pointer; color:#ffd54f; font-size:13px; font-weight:600;">📖 Codebook Reference</summary>
        ${ch1RenderCodebookRef()}
      </details>
      <div class="seq-display">${seqHtml}</div>
      <div class="numpad">${numpadHtml}</div>
      <div id="ch1-msg"></div>
    </div>
  `);
}

function ch1Pick(n) {
  if (ch1.pos >= ch1.target.length) return;
  if (n === ch1.target[ch1.pos]) {
    spawnParticles(W/2, H * 0.7, 5, { color: '#66bb6a', spread: 0.3 });
    ch1.pos++;
    if (ch1.pos >= ch1.target.length) {
      spawnParticles(W/2, H/2, 25, { color: '#ffd54f', spread: 1.5, glow: 15 });
      setTimeout(() => ch1ShowStage3(), 800);
    }
    ch1RenderStage2();
  } else {
    const btn = document.getElementById(`np-${n}`);
    btn.classList.add('wrong');
    setTimeout(() => btn.classList.remove('wrong'), 350);
  }
}

function ch1ShowStage3() {
  ch1.stage = 3;
  ch1.decodeWord = NAMES.filter(n => n !== ch1.word)[randInt(0, 10)];
  const tokens = [26, ...ch1.decodeWord.split('').map(c => ch1.codebook[c]), 26];

  const seqHtml = tokens.map(t =>
    `<div class="seq-slot done" style="border-color:#4fc3f7; background:rgba(79,195,247,0.1)">
      <span class="s-num" style="color:#4fc3f7; font-size:18px;">${t}</span>
    </div>`
  ).join('');

  setPanel(`
    <div class="panel">
      <h2>🐜 Decode the Scent Trail</h2>
      <p>An ant patrol returned with this sequence. What name did they carry?</p>
      <details open style="margin:8px 0;">
        <summary style="cursor:pointer; color:#ffd54f; font-size:13px; font-weight:600;">📖 Codebook Reference</summary>
        ${ch1RenderCodebookRef()}
      </details>
      <div class="seq-display">${seqHtml}</div>
      <div style="text-align:center; margin:12px 0;">
        <input type="text" id="decode-in" placeholder="Type the name..."
          style="padding:10px 16px; font-size:18px; border-radius:8px; border:2px solid #1b5e20; background:#0a1a0f; color:#e8f5e9; text-align:center; width:180px;"
          onkeydown="if(event.key==='Enter')ch1CheckDecode()">
        <button class="btn btn-green" onclick="ch1CheckDecode()" style="margin-left:6px;">Check</button>
      </div>
      <div id="ch1-msg"></div>
    </div>
  `);
  // Spawn ants carrying the scent trail visually
  tokens.forEach((t, i) => {
    setTimeout(() => {
      ants.push(new Ant(W + 20, H * 0.4, W * 0.3 + i * 40, H * 0.6, t, '#4fc3f7'));
    }, i * 300);
  });
}

function ch1CheckDecode() {
  const input = document.getElementById('decode-in').value.trim().toLowerCase();
  const msg = document.getElementById('ch1-msg');
  if (input === ch1.decodeWord) {
    spawnParticles(W/2, H/2, 40, { color: '#ffd54f', spread: 2, glow: 20, sizeMul: 1.5 });
    msg.innerHTML = `<div class="msg msg-ok">✅ Correct! The ants said "${ch1.decodeWord}"!</div>`;
    setTimeout(() => ch1ShowAha(), 600);
  } else {
    msg.innerHTML = `<div class="msg msg-err">Not quite — use the codebook above!</div>`;
  }
}

function ch1ShowAha() {
  setPanel(`
    <div class="panel">
      <h2>💡 You just built a Tokenizer!</h2>
      <div class="aha">
        <strong>In real LLMs:</strong><br>
        Your <span class="real">codebook</span> = the tokenizer's vocabulary<br>
        Your <span class="real">scent numbers</span> = token IDs<br>
        The <span class="real">⟨BOS⟩</span> = special boundary tokens<br><br>
        ChatGPT uses ~100,000 tokens representing word chunks ("the", "ing") instead of single characters. Same idea, bigger scale.
      </div>
      <div style="text-align:center; margin-top:14px;">
        <button class="btn btn-gold" onclick="completeCh(1)">🏆 Chapter Complete →</button>
      </div>
    </div>
  `);
}

/* ═══════════════════════════════════════════════════════════════
   CHAPTER 2: THE RIVER NETWORK (GRADIENTS)
   ═══════════════════════════════════════════════════════════════ */
let ch2 = { gates: [1.5, 0.8, 1.0], target: 8.5, rain: [3, 2], solved: false };

// River network nodes for rendering
const riverNodes = () => [
  { id: 'r1', x: W*0.1, y: H*0.18, label: '🌧️', val: ch2.rain[0], color: '#4fc3f7', type: 'rain' },
  { id: 'r2', x: W*0.1, y: H*0.52, label: '🌧️', val: ch2.rain[1], color: '#4fc3f7', type: 'rain' },
  { id: 'g1', x: W*0.32, y: H*0.18, label: '⛩️', val: ch2.rain[0]*ch2.gates[0], color: '#66bb6a', type: 'gate', gi: 0 },
  { id: 'g2', x: W*0.32, y: H*0.52, label: '⛩️', val: ch2.rain[1]*ch2.gates[1], color: '#66bb6a', type: 'gate', gi: 1 },
  { id: 'm',  x: W*0.55, y: H*0.35, label: '🔀', val: ch2.rain[0]*ch2.gates[0]+ch2.rain[1]*ch2.gates[1], color: '#b39ddb', type: 'merge' },
  { id: 'g3', x: W*0.75, y: H*0.35, label: '⛩️', val: (ch2.rain[0]*ch2.gates[0]+ch2.rain[1]*ch2.gates[1])*ch2.gates[2], color: '#66bb6a', type: 'gate', gi: 2 },
];
const riverEdges = [[0,2],[1,3],[2,4],[3,4],[4,5]];

sceneDraw.ch2 = function(dt, t) {
  const nodes = riverNodes();
  // Draw river flows
  riverEdges.forEach(([a,b]) => {
    const na = nodes[a], nb = nodes[b];
    const flow = Math.min(na.val, nb.val);
    const width = clamp(flow * 1.5 + 1, 1, 14);
    // Animated dashes
    ctx.strokeStyle = `rgba(79,195,247,${clamp(flow/6, 0.15, 0.7)})`;
    ctx.lineWidth = width;
    ctx.setLineDash([8, 6]);
    ctx.lineDashOffset = -t * 40;
    ctx.beginPath();
    ctx.moveTo(na.x, na.y);
    ctx.quadraticCurveTo((na.x+nb.x)/2, (na.y+nb.y)/2 + 15, nb.x, nb.y);
    ctx.stroke();
    ctx.setLineDash([]);
    // Spawn water drops along flow
    if (Math.random() < flow * 0.04) {
      const frac = Math.random();
      const px = lerp(na.x, nb.x, frac);
      const py = lerp(na.y, nb.y, frac) + rand(-5, 5);
      waterDrops.push(new WaterDrop(px, py, rand(-3, 3), rand(-15, 5)));
    }
  });

  // Draw nodes
  nodes.forEach(n => {
    // Glow
    ctx.shadowBlur = 15;
    ctx.shadowColor = n.color;
    ctx.fillStyle = n.color + '22';
    ctx.beginPath();
    ctx.arc(n.x, n.y, 28, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
    // Border
    ctx.strokeStyle = n.color + '66';
    ctx.lineWidth = 2;
    ctx.stroke();
    // Icon
    ctx.font = '20px serif';
    ctx.textAlign = 'center';
    ctx.fillText(n.label, n.x, n.y + 2);
    // Value
    ctx.font = 'bold 13px sans-serif';
    ctx.fillStyle = n.color;
    ctx.fillText(n.val.toFixed(1), n.x, n.y + 22);
    // Gate multiplier label
    if (n.type === 'gate') {
      ctx.font = '11px sans-serif';
      ctx.fillStyle = '#ffd54f';
      ctx.fillText(`×${ch2.gates[n.gi].toFixed(1)}`, n.x, n.y - 22);
    }
  });

  // Ocean
  const ocean = nodes[5].val;
  const oceanX = W * 0.88, oceanY = H * 0.35;
  const fillH = clamp(ocean / 15, 0, 1) * 60;
  ctx.fillStyle = 'rgba(79,195,247,0.08)';
  ctx.fillRect(oceanX - 30, oceanY - 30, 60, 60);
  ctx.fillStyle = 'rgba(79,195,247,0.25)';
  ctx.fillRect(oceanX - 30, oceanY + 30 - fillH, 60, fillH);
  ctx.strokeStyle = '#4fc3f7';
  ctx.lineWidth = 2;
  ctx.strokeRect(oceanX - 30, oceanY - 30, 60, 60);
  ctx.font = '24px serif';
  ctx.textAlign = 'center';
  ctx.fillText('🌊', oceanX, oceanY + 6);
  ctx.font = 'bold 14px sans-serif';
  ctx.fillStyle = '#4fc3f7';
  ctx.fillText(ocean.toFixed(1), oceanX, oceanY + 42);
  // Target
  ctx.fillStyle = '#ffd54f';
  ctx.font = '12px sans-serif';
  ctx.fillText(`Target: ${ch2.target}`, oceanX, oceanY + 56);
};

function startCh2() {
  scene = 'ch2';
  ch2 = { gates: [1.5, 0.8, 1.0], target: 8.5, rain: [3, 2], solved: false };
  updateHud('🏔️ Chapter 2: The River Network');
  ch2Render();
}

function ch2Render() {
  const ocean = (ch2.rain[0]*ch2.gates[0] + ch2.rain[1]*ch2.gates[1]) * ch2.gates[2];
  const diff = Math.abs(ocean - ch2.target);

  setPanel(`
    <div class="panel" style="max-width:500px;">
      <h2>🏔️ Control the River</h2>
      <p>Rain flows through <span class="highlight">gates</span> that multiply the flow. Adjust them to make the ocean hit <span class="highlight">${ch2.target}</span>.</p>
      ${ch2.gates.map((g, i) => `
        <div class="range-row">
          <label>⛩️ Gate ${i+1}:</label>
          <input type="range" min="0" max="300" value="${g*100}" oninput="ch2SetGate(${i},this.value)">
          <span class="rv" id="g2v-${i}">${g.toFixed(1)}</span>
        </div>
      `).join('')}
      <p style="text-align:center; margin-top:8px;">
        🌊 Ocean: <strong style="color:#4fc3f7">${ocean.toFixed(1)}</strong>
        &nbsp;│&nbsp; 🎯 Target: <strong style="color:#ffd54f">${ch2.target}</strong>
        &nbsp;│&nbsp; Off by: <strong style="color:${diff < 0.3 ? '#66bb6a' : '#ef5350'}">${diff.toFixed(1)}</strong>
      </p>
      <div style="text-align:center; margin-top:10px;">
        <button class="btn btn-green" onclick="ch2Check()">Check Level</button>
      </div>
      <div id="ch2-msg"></div>
    </div>
  `);
}

function ch2SetGate(i, val) {
  ch2.gates[i] = val / 100;
  document.getElementById(`g2v-${i}`).textContent = (val/100).toFixed(1);
  // Update ocean display
  ch2Render();
}

function ch2Check() {
  const ocean = (ch2.rain[0]*ch2.gates[0] + ch2.rain[1]*ch2.gates[1]) * ch2.gates[2];
  const diff = Math.abs(ocean - ch2.target);
  if (diff < 0.3) {
    spawnParticles(W*0.88, H*0.35, 30, { color: '#4fc3f7', spread: 1.5, glow: 15 });
    ch2ShowAha();
  } else {
    document.getElementById('ch2-msg').innerHTML = `<div class="msg msg-err">Off by ${diff.toFixed(1)} — ${ocean > ch2.target ? 'reduce' : 'increase'} some gates!</div>`;
  }
}

function ch2ShowAha() {
  setPanel(`
    <div class="panel">
      <h2>💡 You just did Backpropagation!</h2>
      <div class="aha">
        <strong>In real neural networks:</strong><br>
        <span class="real">Rain</span> = input data flowing through the network<br>
        <span class="real">Gates</span> = model parameters (weights)<br>
        <span class="real">Ocean level</span> = the output (and loss)<br>
        <span class="real">Adjusting gates to hit target</span> = gradient descent<br><br>
        You had to reason <em>backward</em> — "which gate affects the ocean most?" That's exactly the chain rule! The algorithm traces influence backward through the network to figure out which parameters to change.
      </div>
      <div style="text-align:center; margin-top:14px;">
        <button class="btn btn-gold" onclick="completeCh(2)">🏆 Chapter Complete →</button>
      </div>
    </div>
  `);
}

/* ═══════════════════════════════════════════════════════════════
   CHAPTER 3: WHISPERING TREES (ATTENTION)
   ═══════════════════════════════════════════════════════════════ */
let ch3 = { weights: [25,25,25,25], scenario: null };

const CH3_SCENARIOS = [
  { query: 'What follows "ch"?', trees: [
    { topic: 'After "ch"', value: 'r', match: 0.9 },
    { topic: 'Endings', value: 'e', match: 0.3 },
    { topic: 'Vowels', value: 'a', match: 0.5 },
    { topic: 'Rare combos', value: 'z', match: 0.1 }], bestIdx: 0 },
  { query: 'What ends "ann_"?', trees: [
    { topic: 'Name ends', value: 'a', match: 0.8 },
    { topic: 'Starts', value: 'm', match: 0.1 },
    { topic: 'Suffixes', value: 'e', match: 0.6 },
    { topic: 'Clusters', value: 'k', match: 0.2 }], bestIdx: 0 },
];

sceneDraw.ch3 = function(dt, t) {
  if (!ch3.scenario) return;
  const s = ch3.scenario;
  const total = ch3.weights.reduce((a,b) => a+b, 0) || 1;
  const norm = ch3.weights.map(w => w / total);

  // Sapling
  const sapX = W/2, sapY = H * 0.72;
  ctx.font = '40px serif';
  ctx.textAlign = 'center';
  ctx.fillText('🌱', sapX, sapY);

  // Elder tree positions in arc
  const treePos = s.trees.map((_, i) => ({
    x: W * (0.15 + i * 0.23),
    y: H * 0.2 + Math.sin(i * 1.2) * 20
  }));

  s.trees.forEach((tree, i) => {
    const tp = treePos[i];
    const w = norm[i];

    // Mycelium connection (pulsing)
    const pulseAlpha = 0.15 + w * 0.7;
    const pulseWidth = 1 + w * 8;
    ctx.strokeStyle = `rgba(179,157,219,${pulseAlpha})`;
    ctx.lineWidth = pulseWidth;
    ctx.shadowBlur = w * 20;
    ctx.shadowColor = '#b39ddb';
    ctx.beginPath();
    ctx.moveTo(sapX, sapY - 20);
    const cpx = (sapX + tp.x) / 2 + Math.sin(t * 2 + i) * 20;
    const cpy = (sapY + tp.y) / 2 + 30;
    ctx.quadraticCurveTo(cpx, cpy, tp.x, tp.y + 30);
    ctx.stroke();
    ctx.shadowBlur = 0;

    // Pulse particles along connection
    if (w > 0.2 && Math.random() < w * 0.15) {
      const frac = Math.random();
      const bx = lerp(sapX, tp.x, frac);
      const by = lerp(sapY, tp.y + 30, frac);
      particles.push(new Particle(bx, by, {
        size: 2, life: 0.6, color: '#b39ddb', glow: 10, gravity: 0, vx: 0, vy: 0
      }));
    }

    // Tree
    ctx.font = '36px serif';
    ctx.fillText('🌳', tp.x, tp.y);

    // Labels
    ctx.font = '11px sans-serif';
    ctx.fillStyle = '#66bb6a';
    ctx.fillText(tree.topic, tp.x, tp.y + 22);
    ctx.font = 'bold 18px sans-serif';
    ctx.fillStyle = '#b39ddb';
    ctx.fillText(`"${tree.value}"`, tp.x, tp.y + 42);
    ctx.font = 'bold 13px sans-serif';
    ctx.fillStyle = '#ffd54f';
    ctx.fillText(`${Math.round(w * 100)}%`, tp.x, tp.y + 58);
  });
};

function startCh3() {
  scene = 'ch3';
  ch3.scenario = CH3_SCENARIOS[randInt(0, CH3_SCENARIOS.length)];
  ch3.weights = [25, 25, 25, 25];
  updateHud('🌳 Chapter 3: Whispering Trees');
  ch3Render();
}

function ch3Render() {
  const s = ch3.scenario;
  const total = ch3.weights.reduce((a,b) => a+b, 0) || 1;
  const norm = ch3.weights.map(w => w / total);
  // Weighted prediction
  const scores = {};
  s.trees.forEach((t, i) => { scores[t.value] = (scores[t.value] || 0) + norm[i]; });
  const best = Object.entries(scores).sort((a,b) => b[1]-a[1])[0];

  setPanel(`
    <div class="panel" style="max-width:520px;">
      <h2>🌳 Help the Sapling</h2>
      <p>The sapling asks: <span class="highlight">"${s.query}"</span><br>
      Which elder trees should it listen to most? Adjust the attention weights:</p>
      ${s.trees.map((t, i) => `
        <div class="range-row">
          <label>🌲 "${t.value}" (${t.topic})</label>
          <input type="range" min="0" max="100" value="${ch3.weights[i]}" oninput="ch3Set(${i},this.value)">
          <span class="rv" id="c3v-${i}">${Math.round(norm[i]*100)}%</span>
        </div>
      `).join('')}
      <p style="text-align:center;">Prediction: <strong style="color:#b39ddb; font-size:20px;">"${best[0]}"</strong> <span style="color:#6b8f6e">(${Math.round(best[1]*100)}% confidence)</span></p>
      <div style="text-align:center;">
        <button class="btn btn-green" onclick="ch3Check()">Submit Attention</button>
      </div>
      <div id="ch3-msg"></div>
    </div>
  `);
}

function ch3Set(i, val) {
  ch3.weights[i] = parseInt(val);
  ch3Render();
}

function ch3Check() {
  const total = ch3.weights.reduce((a,b) => a+b, 0) || 1;
  const norm = ch3.weights.map(w => w / total);
  const maxIdx = norm.indexOf(Math.max(...norm));
  if (maxIdx === ch3.scenario.bestIdx && norm[maxIdx] > 0.35) {
    spawnParticles(W/2, H*0.5, 30, { color: '#b39ddb', spread: 2, glow: 15 });
    ch3ShowAha();
  } else {
    document.getElementById('ch3-msg').innerHTML = `<div class="msg msg-err">The "${ch3.scenario.trees[ch3.scenario.bestIdx].topic}" elder knows best — give it more attention!</div>`;
  }
}

function ch3ShowAha() {
  setPanel(`
    <div class="panel">
      <h2>💡 You just computed Attention!</h2>
      <div class="aha">
        <strong>In real transformers:</strong><br>
        Sapling's <span class="real">question</span> = Query (Q)<br>
        Each elder's <span class="real">expertise topic</span> = Key (K)<br>
        Each elder's <span class="real">advice</span> = Value (V)<br>
        <span class="real">Matching question to topic</span> = Q·K dot product<br>
        <span class="real">Attention weights</span> = softmax of scores<br>
        <span class="real">Final wisdom</span> = weighted sum of Values<br><br>
        Multi-head attention = multiple saplings asking <em>different questions</em> simultaneously!
      </div>
      <div style="text-align:center; margin-top:14px;">
        <button class="btn btn-gold" onclick="completeCh(3)">🏆 Chapter Complete →</button>
      </div>
    </div>
  `);
}

/* ═══════════════════════════════════════════════════════════════
   CHAPTER 4: VILLAGE ELDER (TRAINING)
   ═══════════════════════════════════════════════════════════════ */
let ch4 = { step: 0, losses: [], model: null };

function ch4InitModel() {
  ch4.model = {};
  for (let i = 0; i < 27; i++) {
    ch4.model[i] = {};
    for (let j = 0; j < 27; j++) ch4.model[i][j] = 1;
  }
  ch4.step = 0;
  ch4.losses = [];
}

sceneDraw.ch4 = function(dt, t) {
  if (ch4.losses.length < 2) return;
  const losses = ch4.losses;
  const pad = 60;
  const gW = W * 0.55;
  const gH = H * 0.45;
  const gX = (W - gW) / 2;
  const gY = H * 0.08;

  const maxL = Math.max(3.5, ...losses);
  const minL = Math.min(1.0, ...losses);

  // Grid background
  ctx.fillStyle = 'rgba(10,26,15,0.7)';
  ctx.fillRect(gX, gY, gW, gH);
  ctx.strokeStyle = '#1b5e2044';
  ctx.lineWidth = 1;
  for (let i = 0; i <= 4; i++) {
    const y = gY + gH * i / 4;
    ctx.beginPath(); ctx.moveTo(gX, y); ctx.lineTo(gX + gW, y); ctx.stroke();
    ctx.fillStyle = '#6b8f6e';
    ctx.font = '11px sans-serif';
    ctx.textAlign = 'right';
    ctx.fillText((maxL - (maxL-minL)*i/4).toFixed(1), gX - 6, y + 4);
  }

  // Target line
  const targetY = gY + gH * (1 - (2.0 - minL)/(maxL - minL));
  ctx.strokeStyle = '#ffd54f44';
  ctx.setLineDash([5,4]);
  ctx.beginPath(); ctx.moveTo(gX, targetY); ctx.lineTo(gX+gW, targetY); ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = '#ffd54f';
  ctx.font = '11px sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText('🎯 2.0', gX+gW+4, targetY+4);

  // Loss curve
  ctx.beginPath();
  ctx.strokeStyle = '#ef5350';
  ctx.lineWidth = 2.5;
  ctx.shadowBlur = 6;
  ctx.shadowColor = '#ef5350';
  losses.forEach((l, i) => {
    const x = gX + gW * i / (losses.length - 1);
    const y = gY + gH * (1 - (l - minL) / (maxL - minL));
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  });
  ctx.stroke();
  ctx.shadowBlur = 0;

  // Labels
  ctx.fillStyle = '#6b8f6e';
  ctx.font = '12px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('Training Steps →', gX + gW/2, gY + gH + 20);
  ctx.save();
  ctx.translate(gX - 30, gY + gH/2);
  ctx.rotate(-Math.PI/2);
  ctx.fillText('Loss (surprise) ↓', 0, 0);
  ctx.restore();
};

function startCh4() {
  scene = 'ch4';
  ch4InitModel();
  updateHud('🏘️ Chapter 4: The Village Elder');
  ch4Render();
}

function ch4TrainStep() {
  const name = NAMES[ch4.step % NAMES.length];
  const tokens = [26, ...name.split('').map(c => ALPHA.indexOf(c)), 26];
  let totalLoss = 0;
  for (let i = 0; i < tokens.length - 1; i++) {
    const curr = tokens[i], next = tokens[i+1];
    const counts = ch4.model[curr];
    const total = Object.values(counts).reduce((a,b) => a+b, 0);
    totalLoss += -Math.log(counts[next] / total);
    counts[next] += 2;
  }
  const avgLoss = totalLoss / (tokens.length - 1);
  ch4.step++;
  ch4.losses.push(avgLoss);
  return { name, loss: avgLoss };
}

function ch4DoStep() {
  const result = ch4TrainStep();
  spawnParticles(W/2, H*0.6, 3, { color: result.loss < 2.5 ? '#66bb6a' : '#ef5350', spread: 0.3 });
  ch4Render();
  if (result.loss < 2.0 && ch4.step >= 20) {
    setTimeout(() => ch4ShowAha(), 500);
  }
}

function ch4Auto() {
  let count = 0;
  const iv = setInterval(() => {
    const r = ch4TrainStep();
    count++;
    if (count % 5 === 0) ch4Render();
    if (count >= 80 || (r.loss < 2.0 && ch4.step >= 20)) {
      clearInterval(iv);
      ch4Render();
      if (r.loss < 2.0) setTimeout(() => ch4ShowAha(), 500);
    }
  }, 30);
}

function ch4Render() {
  const lastLoss = ch4.losses.length > 0 ? ch4.losses[ch4.losses.length - 1] : null;
  setPanel(`
    <div class="panel" style="max-width:460px;">
      <h2>🏘️ Train the Elder</h2>
      <p>The Elder sees names and tries to guess the next letter. Each mistake teaches her. Get the loss below <span class="highlight">2.0</span>!</p>
      <div style="display:flex; gap:8px; justify-content:center; margin:10px 0;">
        <button class="btn btn-green" onclick="ch4DoStep()">🎓 Train Step</button>
        <button class="btn btn-dim" onclick="ch4Auto()">⚡ Auto ×80</button>
      </div>
      <p style="text-align:center; font-size:14px;">
        Step: <strong>${ch4.step}</strong> &nbsp;│&nbsp;
        Loss: <strong style="color:${lastLoss && lastLoss < 2.0 ? '#66bb6a' : '#ffd54f'}">${lastLoss ? lastLoss.toFixed(2) : '—'}</strong>
      </p>
      <div id="ch4-msg"></div>
    </div>
  `);
}

function ch4ShowAha() {
  spawnParticles(W/2, H/2, 40, { color: '#ffd54f', spread: 2, glow: 20, sizeMul: 1.5 });
  setPanel(`
    <div class="panel">
      <h2>💡 You just trained a Language Model!</h2>
      <div class="aha">
        <strong>In real training:</strong><br>
        The Elder's <span class="real">intuition</span> = model parameters<br>
        <span class="real">Showing her names</span> = feeding training data<br>
        Her <span class="real">surprise</span> = loss function (-log probability)<br>
        <span class="real">Adjusting intuition</span> = gradient descent step<br>
        <span class="real">Loss going down</span> = the model is learning!<br><br>
        ChatGPT trains on trillions of words across thousands of GPUs. Same loop.
      </div>
      <div style="text-align:center; margin-top:14px;">
        <button class="btn btn-gold" onclick="completeCh(4)">🏆 Chapter Complete →</button>
      </div>
    </div>
  `);
}

/* ═══════════════════════════════════════════════════════════════
   CHAPTER 5: THE ORACLE (INFERENCE)
   ═══════════════════════════════════════════════════════════════ */
let ch5 = { temp: 0.5, good: 0, generated: [] };

function startCh5() {
  scene = 'ch5';
  ch5 = { temp: 0.5, good: 0, generated: [] };
  // Ensure model is trained
  if (!ch4.model || ch4.step < 50) {
    ch4InitModel();
    for (let i = 0; i < 200; i++) {
      const name = NAMES[i % NAMES.length];
      const tokens = [26, ...name.split('').map(c => ALPHA.indexOf(c)), 26];
      for (let j = 0; j < tokens.length - 1; j++) ch4.model[tokens[j]][tokens[j+1]] += 2;
    }
  }
  updateHud('🔮 Chapter 5: The Oracle Speaks');
  ch5Render();
}

function ch5Gen() {
  let token = 26, name = [];
  for (let i = 0; i < 15; i++) {
    const counts = ch4.model[token];
    const total = Object.values(counts).reduce((a,b) => a+b, 0);
    let probs = [];
    for (let j = 0; j < 27; j++) probs.push(Math.pow(counts[j] / total, 1 / ch5.temp));
    const pTotal = probs.reduce((a,b) => a+b, 0);
    let r = Math.random() * pTotal, chosen = 0;
    for (let j = 0; j < 27; j++) { r -= probs[j]; if (r <= 0) { chosen = j; break; } }
    if (chosen === 26) break;
    name.push(ALPHA[chosen]);
    token = chosen;
  }
  const n = name.join('');
  ch5.generated.unshift(n);
  spawnParticles(W/2, H*0.3, 12, { color: '#b39ddb', spread: 1, glow: 12 });
  ch5Render();
}

function ch5Rate(idx, good) {
  if (good) {
    ch5.good++;
    spawnParticles(W/2, H*0.5, 15, { color: '#66bb6a', spread: 1 });
  }
  ch5.generated[idx] = { name: ch5.generated[idx].name || ch5.generated[idx], rated: true, good };
  ch5Render();
  if (ch5.good >= 5) setTimeout(() => ch5ShowAha(), 600);
}

function ch5Render() {
  const genHtml = ch5.generated.slice(0, 8).map((g, i) => {
    const name = g.name || g;
    const rated = g.rated;
    if (rated) {
      return `<div style="padding:6px 14px;border-radius:8px;display:inline-block;margin:3px;border:1px solid ${g.good?'#66bb6a':'#ef535066'};opacity:${g.good?1:0.4}">${name} ${g.good?'👍':'👎'}</div>`;
    }
    return `<div style="padding:6px 14px;border-radius:8px;display:inline-flex;gap:6px;align-items:center;margin:3px;border:1px solid #1b5e20;background:rgba(179,157,219,0.08)">
      <strong style="color:#e8f5e9;font-size:16px;">${name}</strong>
      <button class="btn btn-dim" style="padding:3px 8px;font-size:12px" onclick="ch5Rate(${i},true)">👍</button>
      <button class="btn btn-dim" style="padding:3px 8px;font-size:12px" onclick="ch5Rate(${i},false)">👎</button>
    </div>`;
  }).join('');

  setPanel(`
    <div class="panel" style="max-width:500px;">
      <h2>🔮 The Oracle Speaks</h2>
      <p>Your trained model generates new names! Rate 5 as "sounds real" to win.</p>
      <div class="range-row">
        <label>🌡️ Temperature:</label>
        <input type="range" min="15" max="150" value="${ch5.temp*100}" oninput="ch5.temp=this.value/100;document.getElementById('c5tv').textContent=ch5.temp.toFixed(1)">
        <span class="rv" id="c5tv">${ch5.temp.toFixed(1)}</span>
      </div>
      <p style="text-align:center;font-size:12px;color:#6b8f6e;">🧊 Safe ←──→ Creative 🌪️</p>
      <div style="text-align:center;margin:10px 0;">
        <button class="btn btn-green" onclick="ch5Gen()">🔮 Generate</button>
        <span style="margin-left:10px;color:#ffd54f;font-weight:700;">Good: ${ch5.good}/5</span>
      </div>
      <div style="text-align:center;">${genHtml}</div>
    </div>
  `);
}

function ch5ShowAha() {
  spawnParticles(W/2, H/2, 50, { color: '#ffd54f', spread: 3, glow: 25, sizeMul: 2, lifeMul: 2 });
  setPanel(`
    <div class="panel">
      <h2>💡 You just did LLM Inference!</h2>
      <div class="aha">
        <strong>In ChatGPT:</strong><br>
        The <span class="real">Oracle</span> = your trained model<br>
        <span class="real">Temperature</span> = creativity control<br>
        Each letter = <span class="real">sampling from a probability distribution</span><br>
        <span class="real">⟨BOS⟩ → letters → ⟨BOS⟩</span> = autoregressive generation<br><br>
        When ChatGPT replies to you, it's doing exactly this — one token at a time, sampling from probabilities, until it decides the response is complete.
      </div>
      <div style="text-align:center; margin-top:14px;">
        <button class="btn btn-gold" onclick="showVictory()">🏆 Complete the Journey!</button>
      </div>
    </div>
  `);
}

/* ═══════════════════════════════════════════════════════════════
   CHAPTER FLOW
   ═══════════════════════════════════════════════════════════════ */
function completeCh(n) {
  completed[n - 1] = true;
  const next = [startCh2, startCh3, startCh4, startCh5, showVictory];
  next[n - 1]();
}

function showVictory() {
  completed[4] = true;
  scene = 'victory';
  updateHud('🌟 Journey Complete');
  spawnParticles(W/2, H/2, 80, { color: '#ffd54f', spread: 3, glow: 25, sizeMul: 2, lifeMul: 3 });
  setPanel(`
    <div class="panel panel-center" style="text-align:center; max-width:560px;">
      <h2 style="font-size:32px;">🌟 You Built a Language Model!</h2>
      <p style="font-size:15px;">From ant trails to oracle prophecies — you now understand how LLMs work.</p>
      <div style="text-align:left; margin:16px 0; display:grid; gap:6px;">
        <div>🐜 <strong>Tokenizer</strong> — text ↔ numbers</div>
        <div>🏔️ <strong>Backpropagation</strong> — trace errors backward to fix weights</div>
        <div>🌳 <strong>Attention</strong> — focus on what matters</div>
        <div>🏘️ <strong>Training</strong> — learn patterns from data</div>
        <div>🔮 <strong>Inference</strong> — generate by sampling predictions</div>
      </div>
      <p style="font-size:13px; color:#6b8f6e; border-top:1px solid #1b5e20; padding-top:12px;">
        From this tiny name generator to GPT-4 — the only difference is scale.
      </p>
      <button class="btn btn-dim" onclick="location.reload()" style="margin-top:10px;">🔄 Play Again</button>
    </div>
  `);
}
